{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="InVision U — AI-powered candidate selection system">
    <title>{% block title %}InVision U{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'frontend/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <div class="logo">✦</div>
            InVision U
        </a>
        <div class="navbar-links">
            <a href="/" id="nav-candidates">📋 Кандидаты</a>
            <a href="/register/" id="nav-register">➕ Регистрация</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Toast notification system
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // API helper
        async function api(url, options = {}) {
            const defaults = {
                headers: { 'Content-Type': 'application/json' },
            };
            const resp = await fetch(url, { ...defaults, ...options });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({ error: 'Ошибка сервера' }));
                throw new Error(err.error || err.detail || 'Ошибка запроса');
            }
            return resp.json();
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
