{% extends "frontend/base.html" %}
{% block title %}Вход — inVision U{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:420px;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;box-shadow:var(--shadow-md);">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="width:48px;height:48px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;margin:0 auto 1rem;">iU</div>
      <h2 style="font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px;">Вход в систему</h2>
      <p style="color:var(--text-secondary);font-size:0.88rem;">Для администраторов и учителей</p>
    </div>
    <div id="loginError" style="display:none;background:var(--red-bg);color:var(--red);padding:10px 14px;border-radius:8px;font-size:0.9rem;margin-bottom:1rem;text-align:center;border:1px solid rgba(239,68,68,0.2);"></div>
    <form id="loginForm" style="display:flex;flex-direction:column;gap:1.2rem;">
      <div>
        <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;">Логин</label>
        <input type="text" id="username" placeholder="Введите логин" autocomplete="username" required
               style="width:100%;padding:12px 14px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.95rem;font-family:inherit;outline:none;transition:border-color 0.2s;box-sizing:border-box;">
      </div>
      <div>
        <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;">Пароль</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required
               style="width:100%;padding:12px 14px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.95rem;font-family:inherit;outline:none;transition:border-color 0.2s;box-sizing:border-box;">
      </div>
      <button type="submit" id="loginSubmit" style="background:var(--accent);color:#141414;border:none;border-radius:100px;padding:13px;font-size:0.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.2s;margin-top:0.25rem;display:flex;align-items:center;justify-content:center;gap:8px;">
        <span id="btnText">Войти →</span>
      </button>
    </form>
    <p style="text-align:center;margin-top:1.5rem;">
      <a href="/" style="color:var(--text-secondary);font-size:0.85rem;text-decoration:none;">← На главную</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('loginError');
    const submitBtn = document.getElementById('loginSubmit');
    errorEl.style.display = 'none';
    submitBtn.style.opacity = '0.7';
    try {
        const resp = await fetch('/panel/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify({ username, password }),
        });
        const data = await resp.json();
        if (data.success) {
            window.location.href = data.redirect || '/panel/';
        } else {
            errorEl.textContent = data.error || 'Неверный логин или пароль';
            errorEl.style.display = 'block';
        }
    } catch (err) {
        errorEl.textContent = 'Ошибка сервера';
        errorEl.style.display = 'block';
    } finally {
        submitBtn.style.opacity = '1';
    }
});
function getCookie(name) {
    let value = null;
    document.cookie.split(';').forEach(c => {
        c = c.trim();
        if (c.startsWith(name + '=')) value = c.substring(name.length + 1);
    });
    return value;
}
</script>
{% endblock %}
