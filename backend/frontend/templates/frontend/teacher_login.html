{% extends "frontend/base.html" %}
{% block title %}Вход — Кабинет Учителя{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2>Режим учителя</h2>
        <p>Войдите, чтобы ввести учеников и просмотреть предложения от администраторов</p>

        <div class="login-error" id="loginError" style="display:none;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Логин учителя</label>
                <input type="text" id="username" required placeholder="Введите логин" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" required placeholder="Введите пароль" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary">Войти как учитель</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('loginError');
    errorEl.style.display = 'none';

    try {
        const resp = await fetch('/teacher/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, password }),
        });
        const data = await resp.json();
        if (data.success) {
            window.location = '/teacher/';
        } else {
            errorEl.textContent = data.error || 'Неверный логин или пароль';
            errorEl.style.display = 'block';
        }
    } catch (err) {
        errorEl.textContent = 'Ошибка сервера';
        errorEl.style.display = 'block';
    }
});
</script>
{% endblock %}
