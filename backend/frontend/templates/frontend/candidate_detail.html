{% extends "frontend/base.html" %}
{% block title %}Кандидат — InVision U{% endblock %}

{% block content %}
<div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
    <div>
        <h1 id="candidateName">Загрузка...</h1>
        <p id="candidateMeta"></p>
    </div>
    <div style="display:flex;gap:10px;">
        <button class="btn btn-primary" id="btnScore" onclick="runScore()">🤖 Оценить кандидата</button>
        <a href="/" class="btn btn-secondary">← Назад</a>
    </div>
</div>

<div class="detail-grid" id="detailGrid">
    <div class="loading full-width"><div class="spinner"></div>Загрузка данных...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const CANDIDATE_ID = {{ candidate_id }};

async function loadCandidate() {
    try {
        const data = await api(`/api/candidates/${CANDIDATE_ID}/`);
        renderDetail(data);
    } catch (e) {
        showToast(e.message, 'error');
    }
}

function renderDetail(c) {
    document.getElementById('candidateName').textContent = c.name;
    document.getElementById('candidateMeta').textContent =
        `${c.city || '—'}, ${c.age} лет · ${c.school_type || '—'} · ${c.has_mentor ? 'Есть ментор' : 'Нет ментора'}`;

    const edu = c.profile_data.education || {};
    const exp = c.profile_data.experience || {};
    const essay = c.profile_data.essay || {};
    const scoring = c.scoring;
    const projects = exp.projects || [];
    const olympiads = edu.olympiads || [];
    const courses = edu.courses || [];

    let html = '';

    // Personal info card
    html += `
    <div class="card">
        <div class="card-header"><span class="card-title">👤 Личные данные</span></div>
        <div class="stat-row"><span class="stat-label">Имя</span><span class="stat-value">${esc(c.name)}</span></div>
        <div class="stat-row"><span class="stat-label">Возраст</span><span class="stat-value">${c.age}</span></div>
        <div class="stat-row"><span class="stat-label">Город</span><span class="stat-value">${esc(c.city || '—')}</span></div>
        <div class="stat-row"><span class="stat-label">Регион</span><span class="stat-value">${esc(c.region || '—')}</span></div>
        <div class="stat-row"><span class="stat-label">Тип школы</span><span class="stat-value">${esc(c.school_type || '—')}</span></div>
        <div class="stat-row"><span class="stat-label">Ментор</span><span class="stat-value">${c.has_mentor ? '✅ Есть' : '❌ Нет'}</span></div>
    </div>`;

    // Education card
    html += `
    <div class="card">
        <div class="card-header"><span class="card-title">📚 Образование</span></div>
        <div class="stat-row"><span class="stat-label">GPA</span><span class="stat-value">${edu.gpa || '—'}</span></div>
        <div class="stat-row"><span class="stat-label">Олимпиады</span><span class="stat-value">${olympiads.length}</span></div>
        <div class="stat-row"><span class="stat-label">Курсы</span><span class="stat-value">${courses.length}</span></div>
        ${olympiads.length ? '<div style="margin-top:12px;font-size:0.85rem;color:var(--text-secondary)"><strong>Олимпиады:</strong></div>' +
            olympiads.map(o => `<div class="stat-row"><span class="stat-label">${esc(o.subject)} (${o.level})</span><span class="stat-value badge ${o.result === 'prize' ? 'badge-shortlist' : 'badge-pending'}">${o.result}</span></div>`).join('') : ''}
    </div>`;

    // Scoring card (if scored)
    if (scoring) {
        const r = scoring.full_result;
        html += `
        <div class="card">
            <div class="card-header">
                <span class="card-title">🤖 Результат ML-оценки</span>
                ${predBadge(scoring.prediction)}
            </div>
            <div class="stat-row"><span class="stat-label">Уверенность</span><span class="stat-value">${(scoring.confidence * 100).toFixed(1)}%</span></div>
            ${Object.entries(scoring.probabilities).map(([label, prob]) => `
                <div class="prob-bar-container">
                    <div class="prob-bar-label">
                        <span>${label}</span>
                        <span>${(prob * 100).toFixed(1)}%</span>
                    </div>
                    <div class="prob-bar">
                        <div class="prob-bar-fill ${label}" style="width:${prob * 100}%"></div>
                    </div>
                </div>
            `).join('')}
        </div>`;

        // Radar chart
        if (r && r.radar) {
            html += `
            <div class="card">
                <div class="card-header"><span class="card-title">📊 Радар профиля</span></div>
                <div class="radar-container">
                    <canvas id="radarCanvas" width="300" height="300"></canvas>
                </div>
            </div>`;
        }

        // Explanation
        if (r && r.explanation) {
            html += `
            <div class="card">
                <div class="card-header"><span class="card-title">✅ Сильные стороны</span></div>
                ${(r.explanation.top_positive_factors || []).map(f => `
                    <div class="factor-item">
                        <span class="factor-icon">💪</span>
                        <div>
                            <div class="factor-text">${esc(f.description)}</div>
                            <div class="factor-impact">Вклад: +${f.impact.toFixed(4)}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
            <div class="card">
                <div class="card-header"><span class="card-title">⚠️ Слабые стороны</span></div>
                ${(r.explanation.top_negative_factors || []).map(f => `
                    <div class="factor-item">
                        <span class="factor-icon">📉</span>
                        <div>
                            <div class="factor-text">${esc(f.description)}</div>
                            <div class="factor-impact">Вклад: ${f.impact.toFixed(4)}</div>
                        </div>
                    </div>
                `).join('')}
            </div>`;
        }

        // Flags
        if (r && r.flags) {
            html += `
            <div class="card full-width">
                <div class="card-header"><span class="card-title">🚩 Флаги</span></div>
                ${Object.values(r.flags).map(f => `
                    <div class="flag-item flag-${f.status}">
                        <strong>${esc(f.label)}</strong>: ${esc(f.detail)}
                    </div>
                `).join('')}
            </div>`;
        }
    } else {
        html += `
        <div class="card">
            <div class="card-header"><span class="card-title">🤖 ML-оценка</span></div>
            <div class="empty-state">
                <div class="icon">⏳</div>
                <p>Кандидат ещё не оценён</p>
                <button class="btn btn-primary" style="margin-top:1rem" onclick="runScore()">Оценить сейчас</button>
            </div>
        </div>`;
    }

    // Projects
    if (projects.length) {
        html += `
        <div class="card full-width">
            <div class="card-header"><span class="card-title">🚀 Проекты (${projects.length})</span></div>
            ${projects.map(p => `
                <div class="factor-item">
                    <span class="factor-icon">${p.type === 'technical' ? '💻' : p.type === 'social' ? '🤝' : p.type === 'media' ? '📱' : p.type === 'business' ? '💼' : '📌'}</span>
                    <div>
                        <div class="factor-text"><strong>${esc(p.name)}</strong> (${p.year})</div>
                        <div class="factor-impact">Роль: ${p.role} · Команда: ${p.team_size || 1} чел. · Тип: ${p.type}</div>
                        ${p.description ? `<div style="margin-top:4px;font-size:0.85rem;color:var(--text-secondary)">${esc(p.description)}</div>` : ''}
                    </div>
                </div>
            `).join('')}
        </div>`;
    }

    // Timeline
    if (scoring && scoring.full_result && scoring.full_result.trajectory && scoring.full_result.trajectory.length) {
        html += `
        <div class="card full-width">
            <div class="card-header"><span class="card-title">📅 Хронология</span></div>
            <div class="timeline">
                ${scoring.full_result.trajectory.map(e => `
                    <div class="timeline-item ${e.type}">
                        <div class="timeline-year">${e.year}</div>
                        <div class="timeline-title">${esc(e.title)}</div>
                        <div class="timeline-meta">${e.role || e.result || ''} ${e.category || e.level || ''}</div>
                    </div>
                `).join('')}
            </div>
        </div>`;
    }

    // Essay
    if (essay.text) {
        html += `
        <div class="card full-width">
            <div class="card-header"><span class="card-title">📝 Эссе: ${esc(essay.topic || '')}</span></div>
            <p style="font-size:0.9rem;line-height:1.8;color:var(--text-secondary)">${esc(essay.text)}</p>
            <div style="margin-top:10px;font-size:0.8rem;color:var(--text-muted)">${essay.word_count || '?'} слов</div>
        </div>`;
    }

    // Motivation
    const motivation = c.profile_data.motivation || {};
    if (motivation.text) {
        html += `
        <div class="card full-width">
            <div class="card-header"><span class="card-title">💡 Мотивация</span></div>
            <p style="font-size:0.9rem;line-height:1.8;color:var(--text-secondary)">${esc(motivation.text)}</p>
        </div>`;
    }

    document.getElementById('detailGrid').innerHTML = html;

    // Draw radar chart if scored
    if (scoring && scoring.full_result && scoring.full_result.radar) {
        setTimeout(() => drawRadar(scoring.full_result.radar), 100);
    }
}

// Radar chart using Canvas
function drawRadar(data) {
    const canvas = document.getElementById('radarCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const cx = 150, cy = 150, r = 110;
    const labels = Object.keys(data);
    const values = Object.values(data);
    const n = labels.length;
    const maxVal = 5;

    ctx.clearRect(0, 0, 300, 300);

    // Draw grid
    for (let level = 1; level <= 5; level++) {
        ctx.beginPath();
        const lr = (r * level) / maxVal;
        for (let i = 0; i <= n; i++) {
            const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
            const x = cx + lr * Math.cos(angle);
            const y = cy + lr * Math.sin(angle);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = 'rgba(42, 53, 80, 0.6)';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // Draw axes
    for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
        ctx.strokeStyle = 'rgba(42, 53, 80, 0.4)';
        ctx.stroke();
    }

    // Draw data polygon
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
        const idx = i % n;
        const angle = (Math.PI * 2 * idx) / n - Math.PI / 2;
        const vr = (r * values[idx]) / maxVal;
        const x = cx + vr * Math.cos(angle);
        const y = cy + vr * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.fillStyle = 'rgba(99, 102, 241, 0.2)';
    ctx.fill();
    ctx.strokeStyle = '#6366f1';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Draw points and labels
    for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
        const vr = (r * values[i]) / maxVal;
        const x = cx + vr * Math.cos(angle);
        const y = cy + vr * Math.sin(angle);

        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#6366f1';
        ctx.fill();

        // Label
        const lx = cx + (r + 20) * Math.cos(angle);
        const ly = cy + (r + 20) * Math.sin(angle);
        ctx.fillStyle = '#94a3b8';
        ctx.font = '11px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${labels[i]} (${values[i]})`, lx, ly);
    }
}

async function runScore() {
    try {
        document.getElementById('btnScore').disabled = true;
        document.getElementById('btnScore').textContent = '⏳ Оцениваю...';
        showToast('Запущена оценка...', 'info');
        await api(`/api/candidates/${CANDIDATE_ID}/score/`, { method: 'POST' });
        showToast('Кандидат оценён!', 'success');
        loadCandidate();
        document.getElementById('btnScore').disabled = false;
        document.getElementById('btnScore').innerHTML = '🤖 Оценить кандидата';
    } catch (e) {
        showToast(e.message, 'error');
        document.getElementById('btnScore').disabled = false;
        document.getElementById('btnScore').innerHTML = '🤖 Оценить кандидата';
    }
}

function predBadge(pred) {
    if (!pred) return '<span class="badge badge-pending">Не оценён</span>';
    const cls = { shortlist: 'badge-shortlist', maybe: 'badge-maybe', reject: 'badge-reject' };
    const labels = { shortlist: 'Shortlist', maybe: 'Maybe', reject: 'Reject' };
    return `<span class="badge ${cls[pred] || ''}">${labels[pred] || pred}</span>`;
}

function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

loadCandidate();
</script>
{% endblock %}
